[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(220)|float %}
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1
    SET_FILAMENT_SENSOR SENSOR=filament_switch ENABLE=1
    #Home all axses
    STATUS_HOMING
    M117 Homing...
    G28
    #Go to front
    G0 X-7 Y-5 F3000
    G1 Z1 F1500
    #Preheat nozzle
    STATUS_HEATING
    # Start nozzle heating
    M104 S{EXTRUDER_TEMP-20}
    # Start bed heating
    M140 S{BED_TEMP}
    # Wait for bed to reach temperature
    M190 S{BED_TEMP}
    # Wait for nozzle to reach temperature
    M109 S{EXTRUDER_TEMP-10}
    M117 Cleaning...                 ; display message
    STATUS_CLEANING
    #Extrude some
    M83
    G1 E15 F300
    M83
    G1 E-5
    #Use fan
    M106 S255
    #G4 P5000
    M109 S{EXTRUDER_TEMP}
    M106 S0
    NOZZLE_WIPE
    #Homing Z
    STATUS_HOMING
    M117 Homing...
    G28 z
    STATUS_PRINTING
    M117 Printing...
    BED_MESH_PROFILE LOAD=default_60c
    G0 X65 Y-7 F4000 ; Go to front
    G1 Z0.2 F500 ; Drop to bed E0 ; zero the extruded length
    M109 S{EXTRUDER_TEMP}
    M83 E0
    G1 E5 F600
    PURGE_LINE
    
    

[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script
gcode:
    #   Get Boundaries
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
    
    #   Check end position to determine safe directions to move
    {% if printer.toolhead.position.x < (max_x - 15) %}
        {% set x_safe = 10.0 %}
    {% else %}
        {% set x_safe = -10.0 %}
    {% endif %}

    {% if printer.toolhead.position.y < (max_y - 15) %}
        {% set y_safe = 10.0 %}
    {% else %}
        {% set y_safe = -10.0 %}
    {% endif %}

    {% if printer.toolhead.position.z < (max_z - 2) %}
        {% set z_safe = 50.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
    SET_FILAMENT_SENSOR SENSOR=filament_switch ENABLE=0
    #  Commence PRINT_END
    M400                             ; wait for buffer to clear
    G92 E0                           ; zero the extruder
    G1 E-4.0 F3600                   ; retract
    G91                              ; relative positioning
    G0 Z{z_safe} + Z10 F3600         ; move nozzle up
    G0 X{x_safe} Y{y_safe} F3600     ; move nozzle to remove stringing
    M104 S0                          ; turn off hotend
    M140 S0                          ; turn off bed
    M106 S0                          ; turn off fan
    G90                              ; absolute positioning
    G0 X{0} Y{max_y - 5} F3600   ; park nozzle at rear
    M84
    STATUS_PART_READY
    M117 Finished!
    