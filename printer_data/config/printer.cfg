#####################################################################
#   STEALTHBURNER EBB36
#####################################################################
[temperature_sensor EBB]
sensor_type: temperature_mcu
sensor_mcu: EBBCan

[adxl345 toolhead]
cs_pin: EBBCan: PB12
spi_software_sclk_pin: EBBCan: PB10
spi_software_mosi_pin: EBBCan: PB11
spi_software_miso_pin: EBBCan: PB2
axes_map: x,y,z

[extruder]
step_pin: EBBCan: PD0
dir_pin: !EBBCan: PD1
enable_pin: !EBBCan: PD2
microsteps: 32
rotation_distance: 35.263 #35.800
gear_ratio: 60:10
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 1000.0
max_extrude_cross_section: 500
max_extrude_only_velocity: 200
max_extrude_only_accel: 10000
min_extrude_temp: 135
heater_pin: EBBCan: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G #Generic 3950
sensor_pin: EBBCan: PA3
#control: pid
#pid_Kp: 17.439
#pid_Ki: 0.901
#pid_Kd: 84.361
min_temp: 0
max_temp: 300
pressure_advance: 0.05
pressure_advance_smooth_time: 0.03
#PID parameters: pid_Kp=17.439 pid_Ki=0.901 pid_Kd=84.361

# sensor_type:MAX31865
# sensor_pin: EBBCan: PA4
# spi_bus: spi1
# rtd_nominal_r: 100
# rtd_reference_r: 430
# rtd_num_of_wires: 2

[tmc2209 extruder]
uart_pin: EBBCan: PA15
run_current: 0.70
hold_current: 0.50
interpolate: false
sense_resistor: 0.110
stealthchop_threshold: 999999

#EXAUST FAN IS USED
#[fan]
#pin: EBBCan: PA0
#kick_start_time: 0.5
##	Depending on your fan, you may need to increase this value
##	if your fan will not start. Can change cycle_time (increase)
##	if your fan is not able to slow down effectively
#off_below: 0.10

# this is the default part cooling fan
#[fan_generic fan0]
#pin: EBBCan: PA0
#kick_start_time: 0.5
#cycle_time: 0.01
#off_below: 0.10
#hardware_pwm: false
[fan]
pin: EBBCan: PA0
cycle_time: 0.01
kick_start_time: 0.2
hardware_pwm: False

[heater_fan hotend_fan]
pin: EBBCan: PA1
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
##	If you are experiencing back flow, you can reduce fan_speed
fan_speed: 0.4


[servo klicky_servo]
#check were your servo is wired
pin: PE9
maximum_servo_angle: 180
minimum_pulse_width: 0.00025
maximum_pulse_width: 0.0024

[gcode_macro _servo_test_angle]
gcode:
	{% set ANGLE  = params.ANGLE|int %}
	
    SET_SERVO SERVO=klicky_servo ANGLE={ANGLE}
    G4 P250
    SET_SERVO SERVO=klicky_servo WIDTH=0.0


[probe]
##	Inductive Probe
##	This probe is not used for Z height, only Quad Gantry Leveling
##  NPN and PNP proximity switch types can be set by jumper
pin: EBBCan:PB5
x_offset: 0
y_offset: 25.0
z_offset: 2
speed: 16.0
samples: 2
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.006
samples_tolerance_retries: 3




#####################################################################
#   BED HEATER
#####################################################################
[heater_bed]
##	SSR Pin - HE0
heater_pin: PA0 
sensor_type: Generic 3950
sensor_pin: PB1 #TB
##  Adjust max_power so it doesn't exceed the SSR rating. The Omron G3NA-210B-DC5 SSR is rated at 4 amps without a heatsink.
##  The formula is "4 / (Wattage_of_bed_heater / Mains_voltage) = max_power"
##  If max_power is greater than 1.0, use 1.0
max_power: 1.0
min_temp: 0
max_temp: 120
smooth_time: 2
#control: pid
#pid_kp: 26.180
#pid_ki: 0.608
#pid_kd: 281.758



#####################################################################
#   HOMING AND BED CALIBRAtiON
#####################################################################
#[safe_z_home] ##USED BY KLICKY PROBE
##	XY Location of the Z Endstop Switch
#home_xy_position:-9,108
#speed:100
#z_hop:25

[bed_mesh]
mesh_min: 10, 10
mesh_max: 210,210
probe_count:7, 7
speed: 120
horizontal_move_z: 10
zero_reference_position: 110,110
fade_start: 1
fade_end: 3
fade_target: 0
mesh_pps: 2, 2
algorithm: bicubic
bicubic_tension: 0.2

[z_tilt]
z_positions:
  -67, 30
  287, 30
points:
  10, 110
  210, 110
speed: 120
horizontal_move_z: 20
retries: 10
retry_tolerance: .0025

[screws_tilt_adjust]
screw1: 10, -10
screw1_name: front left screw
screw2: 210, -10
screw2_name: front right screw
screw3: 210, 185
screw3_name: rear right screw
screw4: 10, 185
screw4_name: rear left screw
horizontal_move_z: 15
speed: 50.
screw_thread: CCW-M3



#####################################################################
#   SMART FILAMENT SENSOR
#####################################################################
[filament_switch_sensor filament_switch]
switch_pin: ^PF0
pause_on_runout: True
runout_gcode:
  #PAUSE # [pause_resume] is required in printer.cfg
  M117 Filament runout detected
insert_gcode:
  M117 Filament insert Detected
  
[filament_motion_sensor filament_sensor]
switch_pin: ^PC15
detection_length: 5.88 # accuracy of motion sensor 2.88mm
extruder: extruder
pause_on_runout: True
runout_gcode:
  #PAUSE # [pause_resume] is required in printer.cfg
  M117 Filament jam detected
insert_gcode:
  M117 Filament insert Detected



