[pause_resume]
[gcode_macro PARK_NOZZLE]
gcode:
    {% set X = params.X|default(50)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=PARK_NOZZLE_state
    PAUSE
    G90  
    G1 X{X} Y{Y} F3000
    G90
    RESTORE_GCODE_STATE NAME=PARK_NOZZLE_state