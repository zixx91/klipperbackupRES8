[gcode_macro PURGE_LINE]
description: Clean nozzle
gcode:
  G90
  G0 X65 Y-7 F4000 ; Go to front
  G1 Z0.2 F500 ; Drop to bed E0 ; zero the extruded length
  M83 E0 ; zero the extruded length
  G1 E5
  G1 X155.0 E5.0 F2000.0 ; PURGE line
  G1 Y-6 E0.05 F2000.0 ; intro line
  G1 X80 E5.0 F2000.0 ; intro line
  G1 Y0 E0.2 F2000.0 ; intro line
  G1 E0
  G1 Z5 ;RISE LITTE
  M83 E0 ; zero the extruded length